<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0f0f1a"/>
  <!-- Portrait placeholder -->
  <circle cx="200" cy="170" r="70" fill="#1e1e3a" stroke="#6366f1" stroke-width="2"/>
  <circle cx="200" cy="150" r="25" fill="#2a2a4a"/>
  <path d="M155 210 Q200 240 245 210" fill="#2a2a4a"/>
  <!-- Audio waveform -->
  <g transform="translate(320, 100)">
    <rect x="0" y="40" width="4" height="30" fill="#6366f1" rx="2"/>
    <rect x="10" y="25" width="4" height="60" fill="#818cf8" rx="2"/>
    <rect x="20" y="15" width="4" height="80" fill="#6366f1" rx="2"/>
    <rect x="30" y="30" width="4" height="50" fill="#818cf8" rx="2"/>
    <rect x="40" y="10" width="4" height="90" fill="#6366f1" rx="2"/>
    <rect x="50" y="20" width="4" height="70" fill="#818cf8" rx="2"/>
    <rect x="60" y="35" width="4" height="40" fill="#6366f1" rx="2"/>
    <rect x="70" y="5" width="4" height="100" fill="#818cf8" rx="2"/>
    <rect x="80" y="25" width="4" height="60" fill="#6366f1" rx="2"/>
    <rect x="90" y="15" width="4" height="80" fill="#818cf8" rx="2"/>
    <rect x="100" y="30" width="4" height="50" fill="#6366f1" rx="2"/>
    <rect x="110" y="40" width="4" height="30" fill="#818cf8" rx="2"/>
    <rect x="120" y="20" width="4" height="70" fill="#6366f1" rx="2"/>
    <rect x="130" y="10" width="4" height="90" fill="#818cf8" rx="2"/>
    <rect x="140" y="35" width="4" height="40" fill="#6366f1" rx="2"/>
    <rect x="150" y="25" width="4" height="60" fill="#818cf8" rx="2"/>
  </g>
  <!-- Arrow -->
  <path d="M270 170 L300 170" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#6366f1"/></marker></defs>
  <!-- Output video frame -->
  <rect x="320" y="210" width="200" height="120" rx="8" fill="#1e1e3a" stroke="#6366f1" stroke-width="1"/>
  <circle cx="420" cy="260" r="20" fill="#2a2a4a" stroke="#818cf8" stroke-width="1"/>
  <polygon points="415,252 432,260 415,268" fill="#818cf8"/>
  <!-- Labels -->
  <text x="200" y="280" font-family="monospace" font-size="11" fill="#818cf8" text-anchor="middle">Portrait + Audio</text>
  <text x="420" y="355" font-family="monospace" font-size="11" fill="#818cf8" text-anchor="middle">AI Lip-Sync Video</text>
</svg>
